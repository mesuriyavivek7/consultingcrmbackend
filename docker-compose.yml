services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consultingcrm-api
    restart: unless-stopped
    ports:
      - "5090:5090"
    environment:
      PORT: 5090
      MONGO_URL: ${MONGO_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
